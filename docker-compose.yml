services:
  db:
    image: postgres:16-alpine
    container_name: mimos-hub-db
    environment:
      POSTGRES_DB: mimos_hub
      POSTGRES_USER: mimos_admin
      POSTGRES_PASSWORD: 53d93d4d06511c82dd027981f779c7f0
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimos_admin -d mimos_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: mimos-hub-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://mimos_admin:53d93d4d06511c82dd027981f779c7f0@db:5432/mimos_hub
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # Desenvolvimento: monta código local e usa --reload
  api-dev:
    build: ./backend
    container_name: mimos-hub-api-dev
    profiles: ["dev"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://mimos_admin:53d93d4d06511c82dd027981f779c7f0@db:5432/mimos_hub
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  uploads:
